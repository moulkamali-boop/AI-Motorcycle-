    *{margin:0;padding:0;box-sizing:border-box}

    .qr-code img{width:44px;height:44px}
    .title-section{text-align:center;flex:1;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
    .title-fixed{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#ffe6b0,#f5a623);-webkit-background-clip:text;background-clip:text;color:transparent}
    .title-translated{font-size:0.75rem;color:#b9c7d9}
    .motorcycle-icon{font-size:2rem;color:#f5a623;cursor:pointer}
    .info-strip{display:flex;justify-content:space-between;align-items:center;background:#00000055;padding:6px 12px;font-size:0.7rem;flex-wrap:wrap;gap:6px}
    .lang-device{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .lang-select{background:#1e2a3a;border:1px solid #f5a623;border-radius:40px;padding:4px 8px;color:#fff;font-size:0.7rem;min-width:140px}
    .device-id{background:#1e2a3a;border-radius:40px;padding:4px 10px;font-family:monospace;font-size:0.7rem}
    .settings-icon{background:#1e2a3a;border:1px solid #f5a623;border-radius:40px;padding:4px 10px;cursor:pointer;font-size:0.9rem;display:inline-flex;align-items:center;gap:6px}
    .free-badge{text-align:center;background:#f5a62320;margin:8px 12px;padding:6px;border-radius:40px;font-weight:bold;color:#f5a623}
    .credit-card{background:#0f172a;border-radius:1.5rem;margin:12px;padding:10px;text-align:center;border:1px solid #3b82f6}
    .credit-amount{font-size:1.8rem;font-weight:800;color:#f5a623}
    .pay-buttons{display:flex;gap:8px;justify-content:center;margin:6px 0;flex-wrap:wrap}
    .pay-btn{background:#10b981;border:none;border-radius:60px;padding:8px 16px;font-weight:bold;cursor:pointer;color:#fff;transition:0.2s}
    .pay-btn:hover{background:#059669;transform:scale(1.02)}
    .license-box{display:flex;gap:8px;justify-content:center;margin-top:6px;flex-wrap:wrap}
    .license-box input{background:#1e2a3a;border:1px solid #3b82f6;border-radius:60px;padding:8px 12px;color:#fff;width:200px}
    .license-box button{background:#3b82f6;border:none;border-radius:60px;padding:8px 16px;cursor:pointer;font-weight:bold;color:#fff}
    .btn-primary{background:#8b5cf6;width:100%;padding:14px;border:none;border-radius:40px;font-weight:bold;color:#fff;margin:12px 0;cursor:pointer;font-size:1rem;transition:0.2s}
    .btn-primary:hover{background:#7c3aed;transform:scale(1.01)}
    .sensor-card{background:#1e2a3e;border-radius:1.5rem;padding:12px;margin:12px;border:2px solid #3b82f6}
    .sensor-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .sensor-icon{font-size:1.8rem;color:#f5a623}
    .sensor-instr{font-size:0.7rem;color:#ccc;margin-bottom:8px}
    .sensor-result{background:#03060c;border-radius:1rem;padding:8px;margin-top:8px;font-size:0.8rem;min-height:55px;border:1px dashed #f5a623}
    .btn-group{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
    button{background:#f97316;border:none;border-radius:40px;padding:6px 12px;font-weight:bold;cursor:pointer;color:#fff;transition:0.2s}
    button:hover{background:#ea580c}
    button:disabled{opacity:0.5;cursor:not-allowed}
    .result-area{background:#0a1020;border-radius:1.5rem;margin:12px;padding:16px;border:2px solid #f5a623}
    .action-buttons{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .action-btn{flex:1;background:#2d3a4e;padding:8px;border-radius:40px;text-align:center;cursor:pointer;font-size:0.7rem;transition:0.2s}
    .action-btn:hover{background:#3b4a60}
    footer{text-align:center;padding:12px;background:#060a12;border-top:1px solid #2a3a5a;font-size:0.65rem}
    .share-buttons{display:flex;justify-content:center;gap:12px;margin-top:8px}
    .share-btn{background:#1e293b;border:1px solid #f5a623;border-radius:40px;padding:6px 12px;cursor:pointer;font-size:0.7rem;display:inline-flex;align-items:center;gap:6px;transition:0.2s}
    .share-btn:hover{background:#334155}
    video,canvas{width:100%;max-height:180px;border-radius:12px;margin-top:6px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#f97316;padding:8px 20px;border-radius:30px;opacity:0;transition:0.2s;z-index:999;font-weight:bold;color:#000}
    .toast.show{opacity:1}
    .admin-only{display:none; margin-top:8px; font-size:0.7rem; background:#1e293b; border-radius:20px; padding:6px; text-align:center}
    .modal-settings{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;visibility:hidden}
    .modal-settings.show{visibility:visible}
    .modal-content{background:#1e2a3a;border-radius:2rem;padding:20px;width:90%;max-width:350px}

    .danger-high{background:#ef4444;color:#fff;display:inline-block;padding:2px 12px;border-radius:30px}

      </div>
    </div>

      <div class="sensor-instr" id="micInstr"></div>
      <div id="micResult" class="sensor-result"></div>

        <button id="micRetakeBtn" disabled>🔄 <span id="micRetakeText"></span></button>
      </div>
    </div>

      <div id="vibResult" class="sensor-result"></div>

      <div id="userResult" class="sensor-result"></div>

    </div>

    <button id="backBtn" class="btn-primary" style="background:#555;">↩️ <span id="backText"></span></button>
  </div>

  <div id="resultPanel" style="display:none;" class="result-area"></div>

  <footer>
    <div style="margin-bottom:8px; word-break:break-all;">
      <a href="https://motocycle-diagnostics.netlify.app" target="_blank" style="color:#f5a623; text-decoration:underline;">https://motocycle-diagnostics.netlify.app</a>
    </div>
    <div class="share-buttons">

    </div>
  </footer>
</div>

</div>

function getFault(smoke, sound, vib) {
  let f = faultsDB.find(f=>f.smoke===smoke && f.sound===sound && f.vib===vib) ||
          faultsDB.find(f=>f.smoke===smoke && f.sound===sound) ||
          faultsDB.find(f=>f.smoke===smoke) ||
          faultsDB[faultsDB.length-1];
  return f;
}

function showToast(msg) { let tDiv=document.getElementById('toast'); tDiv.innerText=msg; tDiv.classList.add('show'); setTimeout(()=>tDiv.classList.remove('show'),2500); }

function consumeCredit() {
  if(admin) return true;
  let left = Math.max(0,3-freeUsed);
  if(left>0) { freeUsed++; localStorage.setItem('motoFreeUsed',freeUsed); updateCreditsUI(); showToast(t('diag_ok')+` (مجاني: ${3-freeUsed} متبقية)`); return true; }
  else if(paid>0) { paid--; localStorage.setItem('motoPaid',paid); updateCreditsUI(); showToast(t('diag_ok')+` (مدفوع: ${paid} متبقية)`); return true; }
  else { showToast(t('no_credits')); return false; }
}

let camOK=false, micOK=false, vibOK=false;
let smokeColor=null, soundType=null, vibIntensity=null, userText="";
let cameraStream=null, micStream=null, audioCtx=null;
let measuring = false;

function resetSensors() {
  camOK=false; micOK=false; vibOK=false; smokeColor=null; soundType=null; vibIntensity=null;
  document.getElementById('camResult').innerHTML=''; document.getElementById('micResult').innerHTML=''; document.getElementById('vibResult').innerHTML='';
  document.getElementById('camConfirmBtn').disabled=true; document.getElementById('camRetakeBtn').disabled=true;
  document.getElementById('micConfirmBtn').disabled=true; document.getElementById('micRetakeBtn').disabled=true;
  document.getElementById('vibConfirmBtn').disabled=true; document.getElementById('vibRetakeBtn').disabled=true;
  document.getElementById('camStartBtn').disabled=false; document.getElementById('micStartBtn').disabled=false; document.getElementById('vibStartBtn').disabled=false;
  document.getElementById('analyzeBtn').disabled=true;
}
function checkAllReady() { if(camOK && micOK && vibOK) document.getElementById('analyzeBtn').disabled=false; }

// كاميرا
document.getElementById('camStartBtn').onclick = async () => {
  if(measuring) return; measuring=true;
  if(cameraStream) cameraStream.getTracks().forEach(t=>t.stop());
  try {
    let stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    cameraStream = stream;
    let video = document.createElement('video'); video.srcObject=stream; video.autoplay=true; video.playsInline=true;
    video.style.width='100%'; video.style.maxHeight='180px';
    let container = document.getElementById('camPreview'); container.innerHTML=''; container.appendChild(video);
    setTimeout(()=>{
      let canvas = document.createElement('canvas'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
      canvas.getContext('2d').drawImage(video,0,0);
      if(cameraStream) cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null;
      let imgData = canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data;
      let r=0,g=0,b=0; for(let i=0;i<imgData.length;i+=4){ r+=imgData[i]; g+=imgData[i+1]; b+=imgData[i+2]; }
      let count=imgData.length/4; r/=count; g/=count; b/=count;
      let smoke='none';
      if(r>200 && g>200 && b>200) smoke='white';
      else if(r<80 && g<80 && b<80) smoke='black';
      else if(r<100 && g<100 && b>150) smoke='blue';
      else if(r>150 && g>150 && b<100) smoke='gray';
      smokeColor=smoke;
      document.getElementById('camResult').innerHTML = `<i class="fas fa-smog"></i> ${t('smoke_'+smoke)}`;
      document.getElementById('camConfirmBtn').disabled=false; document.getElementById('camRetakeBtn').disabled=false; document.getElementById('camStartBtn').disabled=true;
      video.remove(); measuring=false;
    },8000);
  } catch(e){ showToast('❌ فشل الكاميرا'); measuring=false; }
};
document.getElementById('camRetakeBtn').onclick = () => { resetSensors(); document.getElementById('camStartBtn').click(); };
document.getElementById('camConfirmBtn').onclick = () => { camOK=true; document.getElementById('camConfirmBtn').disabled=true; checkAllReady(); };

// ميكروفون
document.getElementById('micStartBtn').onclick = async () => {
  if(measuring) return; measuring=true;
  if(micStream) micStream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close();
  try {
    let stream = await navigator.mediaDevices.getUserMedia({audio:true});
    micStream = stream; let actx = new AudioContext(); audioCtx=actx; await actx.resume();
    let source = actx.createMediaStreamSource(stream); let analyser = actx.createAnalyser(); analyser.fftSize=256;
    source.connect(analyser); let data = new Uint8Array(analyser.frequencyBinCount); let levels=[];
    document.getElementById('micResult').innerHTML = '⏳ جاري التسجيل...';
    let interval = setInterval(()=>{ analyser.getByteFrequencyData(data); let avg=0; for(let v of data) avg+=v; avg/=data.length; levels.push(avg); },100);
    setTimeout(()=>{
      clearInterval(interval); let max = Math.max(...levels); let mean = levels.reduce((a,b)=>a+b,0)/levels.length;
      let type = 'smooth';
      if(max>220) type='knocking';
      else if(mean>150 && max<200) type='rough';
      else if(mean<50 && max<90) type='whistle';
      else if(mean>90 && max<150) type='ticking';
      else if(mean>80 && max>140) type='squeal';
      else if(mean<30) type='hiss';
      else if(max>180 && mean>100) type='rodknock';
      else if(mean>120 && max<160) type='rattle';
      soundType=type;
      document.getElementById('micResult').innerHTML = `<i class="fas fa-waveform"></i> ${t('sound_'+type)}`;
      document.getElementById('micConfirmBtn').disabled=false; document.getElementById('micRetakeBtn').disabled=false; document.getElementById('micStartBtn').disabled=true;
      if(micStream) micStream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close(); micStream=null; audioCtx=null;
      measuring=false;
    },8000);
  } catch(e){ showToast('❌ فشل الميكروفون'); measuring=false; }
};
document.getElementById('micRetakeBtn').onclick = () => { resetSensors(); document.getElementById('micStartBtn').click(); };
document.getElementById('micConfirmBtn').onclick = () => { micOK=true; document.getElementById('micConfirmBtn').disabled=true; checkAllReady(); };

// اهتزاز
document.getElementById('vibStartBtn').onclick = () => {
  if(measuring) return; measuring=true;
  if(!window.DeviceMotionEvent){ showToast('الاهتزاز غير مدعوم'); measuring=false; return; }
  let vals=[]; let handler = e => { let a=e.accelerationIncludingGravity; if(a) vals.push(Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z)); };
  window.addEventListener('devicemotion',handler);
  document.getElementById('vibResult').innerHTML = '⏳ جاري القياس...';
  setTimeout(()=>{
    window.removeEventListener('devicemotion',handler);
    let avg = vals.reduce((a,b)=>a+b,0)/vals.length; let level='low';
    if(avg>15) level='very_high'; else if(avg>8) level='high'; else if(avg>4) level='medium';
    vibIntensity=level;
    document.getElementById('vibResult').innerHTML = `<i class="fas fa-vibrate"></i> ${t(level)}`;
    document.getElementById('vibConfirmBtn').disabled=false; document.getElementById('vibRetakeBtn').disabled=false; document.getElementById('vibStartBtn').disabled=true;
    measuring=false;
  },6000);
};
document.getElementById('vibRetakeBtn').onclick = () => { resetSensors(); document.getElementById('vibStartBtn').click(); };
document.getElementById('vibConfirmBtn').onclick = () => { vibOK=true; document.getElementById('vibConfirmBtn').disabled=true; checkAllReady(); };

let recognition=null;
document.getElementById('userSpeakBtn').onclick = () => {
  if(!('webkitSpeechRecognition' in window)){ showToast("❌ غير مدعوم"); return; }
  const SpeechRecognition = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SpeechRecognition(); recognition.lang = currentLang==='ar'?'ar-EG':'en-US';
  recognition.onresult = (e) => { userText = e.results[0][0].transcript; document.getElementById('userResult').innerHTML = `📝 ${userText}`; showToast(t('copied')); };
  recognition.start();
};

// التشخيص النهائي
document.getElementById('analyzeBtn').onclick = async () => {
  if(!smokeColor || !soundType || !vibIntensity) { showToast("أكمل جميع الحساسات أولاً"); return; }
  if(!consumeCredit()) return;
  let fault = getFault(smokeColor, soundType, vibIntensity);
  let title = (currentLang === 'ar') ? fault.title_ar : fault.title_en;
  let sol = (currentLang === 'ar') ? fault.solution_ar : fault.solution_en;
  let dangerText = t(`severity_${fault.danger}`);
  let html = `<div class="danger-${fault.danger}" style="display:inline-block;margin-bottom:8px">⚠️ ${t('severity')}: ${dangerText}</div><br>
              <strong>🔍 ${t('diag_title')}:</strong> ${title}<br><br>
              <strong>🔧 ${t('solution')}:</strong> ${sol}<br><br>
              ${userText? `<strong>🗣️ ${t('userName')}:</strong> ${userText}<br><br>` : ''}
              <div class="action-buttons">
                <button id="listenResultBtn" class="action-btn">🔊 ${t('listen')}</button>
                <button id="pdfResultBtn" class="action-btn">📄 ${t('pdf')}</button>
                <button id="copyResultBtn" class="action-btn">📋 ${t('copy')}</button>
                <button id="emailResultBtn" class="action-btn">📧 ${t('email')}</button>
                <button id="saveResultBtn" class="action-btn">💾 ${t('save')}</button>
              </div>`;
  document.getElementById('resultPanel').innerHTML = html;
  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('diagPanel').style.display = 'none';
  document.getElementById('listenResultBtn').onclick = () => { let u = new SpeechSynthesisUtterance(title+'. '+sol); u.lang = currentLang==='ar'?'ar-EG':'en-US'; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); };
  document.getElementById('pdfResultBtn').onclick = () => { let content = `AI Motorcycle Diagnostics\n${t('diag_title')}: ${title}\n${t('solution')}: ${sol}\n${t('severity')}: ${dangerText}\n${userText? 'Note: '+userText:''}\nDate: ${new Date().toLocaleString()}`; let blob = new Blob([content],{type:'text/plain'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`moto_diagnosis_${Date.now()}.txt`; a.click(); };
  document.getElementById('copyResultBtn').onclick = () => { navigator.clipboard.writeText(title+'\n'+sol); showToast(t('copied')); };
  document.getElementById('emailResultBtn').onclick = () => { window.location.href=`mailto:?subject=Motorcycle%20Diagnosis&body=${encodeURIComponent(title+'\n'+sol)}`; };
  document.getElementById('saveResultBtn').onclick = () => { localStorage.setItem('lastMotoDiagnosis', JSON.stringify({title,sol})); showToast("✅ تم حفظ التشخيص"); };
};
